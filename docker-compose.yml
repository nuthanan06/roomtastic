services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: roomtastic
      POSTGRES_PASSWORD: roomtastic
      POSTGRES_DB: roomtastic
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgresql+psycopg://roomtastic:roomtastic@db:5432/roomtastic
      - PYTHONUNBUFFERED=1
      - HUNYUAN_SYNC_TIMEOUT_SECONDS=${HUNYUAN_SYNC_TIMEOUT_SECONDS:-900}
      - HUNYUAN_SYNC_POLL_SECONDS=${HUNYUAN_SYNC_POLL_SECONDS:-2}
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  frontend:
    build: ./frontend
    command: npm run dev -- --webpack
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

  redis:
    image: redis:7
    restart: always
    ports:
      - "6379:6379"

  worker:
    build: ./workers
    command: python worker.py
    volumes:
      - ./workers:/app
      - ./backend:/backend
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql+psycopg://roomtastic:roomtastic@db:5432/roomtastic
      - BACKEND_PATH=/backend
      - PYTHONUNBUFFERED=1
      - RUNPOD_ENDPOINT_ID=${RUNPOD_ENDPOINT_ID}
      - RUNPOD_API_KEY=${RUNPOD_API_KEY}
      - RUNPOD_API_BASE=${RUNPOD_API_BASE:-https://api.runpod.ai}
      - RUNPOD_STATUS_POLL_SECONDS=${RUNPOD_STATUS_POLL_SECONDS:-10}
      - RUNPOD_MAX_WAIT_SECONDS=${RUNPOD_MAX_WAIT_SECONDS:-1800}
      - RUNPOD_HTTP_TIMEOUT_SECONDS=${RUNPOD_HTTP_TIMEOUT_SECONDS:-120}
      - HUNYUAN_OUTPUT_DIR=${HUNYUAN_OUTPUT_DIR:-/backend/glb_models}
      - PUBLIC_BACKEND_URL=${PUBLIC_BACKEND_URL:-http://localhost:8000}
    depends_on:
      - redis
      - db
      - backend

volumes:
  postgres_data:
